<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#176b4d">
  <title>Cauta Pret</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="search-panel">
      <div class="brand-row">
        <div class="mark" aria-hidden="true">
          <span></span>
        </div>
        <div class="brand-copy">
          <h1>Cauta Pret</h1>
          <p id="meta">Se incarca baza de produse...</p>
        </div>
        <label class="theme-switch" for="themeToggle">
          <span>Tema</span>
          <input id="themeToggle" type="checkbox" role="switch" aria-label="Tema intunecata">
          <span class="theme-slider" aria-hidden="true"></span>
        </label>
      </div>

      <form id="searchForm" class="search-form">
        <label for="searchInput">Produs</label>
        <div class="search-box">
          <input id="searchInput" type="search" autocomplete="off" placeholder="Ex: lapte, cafea, paine">
          <button type="button" id="clearButton" aria-label="Sterge cautarea">x</button>
        </div>
      </form>

      <div class="category-row">
        <label for="categoryFilter">Categorie</label>
        <select id="categoryFilter">
          <option value="all">Toate categoriile</option>
        </select>
      </div>

      <div class="category-row">
        <label for="subcategoryFilter">Diviziune</label>
        <select id="subcategoryFilter" disabled>
          <option value="all">Alege categoria</option>
        </select>
      </div>

      <div class="category-row discount-row">
        <label for="discountFilter">Procent reducere</label>
        <select id="discountFilter" disabled>
          <option value="all">Toate reducerile</option>
        </select>
      </div>

      <div class="tools">
        <button id="sortName" type="button" class="tool active">A-Z</button>
        <button id="sortPrice" type="button" class="tool">Pret mic</button>
        <button id="onlyPromo" type="button" class="tool">Reduceri</button>
        <button id="cameraButton" type="button" class="tool camera">Camera</button>
        <button id="refreshButton" type="button" class="tool refresh">Actualizeaza</button>
      </div>
      <input id="cameraInput" class="visually-hidden" type="file" accept="image/*" capture="environment">
      <p id="refreshStatus" class="refresh-status" aria-live="polite"></p>
      <p id="cameraStatus" class="camera-status" aria-live="polite"></p>
    </section>

    <section class="summary" aria-live="polite">
      <div>
        <span class="label">Rezultate</span>
        <strong id="resultCount">0</strong>
      </div>
      <div>
        <span class="label">Sursa</span>
        <strong>Catalog Linella</strong>
      </div>
    </section>

    <section id="results" class="results" aria-label="Rezultate produse"></section>
    <button id="loadMoreButton" type="button" class="load-more" hidden>Mai multe</button>
    <p id="emptyState" class="empty" hidden>Nu am gasit produsul. Incearca un nume mai scurt sau actualizeaza baza de date.</p>
  </main>

  <div id="imageModal" class="image-modal" hidden>
    <button id="imageModalClose" class="image-modal-close" type="button" aria-label="Inchide poza">x</button>
    <img id="imageModalImg" src="" alt="">
    <p id="imageModalTitle"></p>
  </div>

  <button id="scrollTopButton" class="scroll-top" type="button" aria-label="Sus" hidden>↑</button>

  <script src="app.js"></script>
</body>
</html>
